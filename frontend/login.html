<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureNote — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      overflow: auto;
    }

    .layout {
      grid-template-columns: 1fr;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      width: 100%;
      max-width: 860px;
      min-height: 500px;
      margin: 0;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
      animation: cardIn .4s ease forwards;
      background: rgba(19, 21, 26, .92);
      min-width: 0;
    }

    /* ── Left Brand Panel ── */
    .auth-brand {
      min-width: 0;
      background: linear-gradient(150deg, #062235 0%, #0d0e11 70%);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 32px;
      padding: 44px 40px;
      position: relative;
      overflow: hidden;
    }

    .auth-brand::before {
      content: '';
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, #c8a96e1a, transparent 70%);
      top: -100px;
      left: -100px;
      pointer-events: none;
    }

    .auth-brand::after {
      content: '';
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, #7eb8f710, transparent 70%);
      bottom: -60px;
      right: -60px;
      pointer-events: none;
    }

    .brand-top {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      min-width: 0;
    }

    .brand-top__icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #f3f3f322, #ffffff44);
      border: 1px solid #5a8dc4;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: var(--accent);
      flex: 0 0 auto;
    }

    .brand-top__icon svg {
      width: 22px;
      height: 22px;
    }

    .brand-top__name {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .brand-top__tagline {
      font-size: .7rem;
      color: var(--text-muted);
      letter-spacing: .05em;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .brand-hero {
      position: relative;
      min-width: 0;
      max-width: 420px;
    }

    .brand-hero__headline {
      font-family: var(--font-serif);
      font-size: 1.9rem;
      font-weight: 400;
      font-style: italic;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 14px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .brand-hero__headline em {
      color: var(--accent);
      font-style: normal;
    }

    .brand-hero__sub {
      font-size: .82rem;
      color: var(--text-dim);
      line-height: 1.75;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .brand-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      position: relative;
    }

    .pill {
      font-family: var(--font-mono);
      font-size: .64rem;
      letter-spacing: .06em;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px 12px;
    }

    /* ── Right Form Panel ── */
    .auth-form-panel {
      width: 100%;
      min-width: 0;
      background: var(--bg-card);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 40px;
    }

    .auth-title {
      font-family: var(--font-serif);
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .auth-title::after {
      content: '.';
      color: var(--accent);
    }

    .auth-subtitle {
      font-size: .8rem;
      color: var(--text-muted);
      margin-bottom: 28px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .auth-subtitle a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-subtitle a:hover {
      text-decoration: underline;
    }

    /* Input with icon */
    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .input-wrap .form-input {
      padding-left: 36px;
    }

    .input-wrap .form-input.has-toggle {
      padding-right: 36px;
    }

    .show-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      transition: color var(--transition);
    }

    .show-toggle:hover {
      color: var(--text);
    }

    .forgot {
      display: block;
      text-align: right;
      font-size: .72rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-top: -10px;
      margin-bottom: 20px;
      transition: color var(--transition);
    }

    .forgot:hover {
      color: var(--accent);
    }

    .btn--full {
      width: 100%;
      justify-content: center;
      padding: 13px 20px;
      font-size: .88rem;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      color: var(--text-muted);
      font-size: .7rem;
      letter-spacing: .06em;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-footer {
      margin-top: 20px;
      text-align: center;
      font-size: .72rem;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color var(--transition);
    }

    .auth-footer a:hover {
      color: var(--accent);
    }

    .feedback {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: .8rem;
      margin-bottom: 16px;
      display: none;
      animation: slideDown .2s ease;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .feedback.err {
      background: #f0707015;
      border: 1px solid #f0707044;
      color: var(--accent-err);
    }

    .feedback.ok {
      background: #6ed8a415;
      border: 1px solid #6ed8a444;
      color: var(--accent-ok);
    }

    /* ========= Tablet ========= */
    @media (max-width: 1024px) {
      .layout {
        padding: 18px;
      }

      .auth-shell {
        grid-template-columns: minmax(0, 1fr) 340px;
        max-width: 760px;
        min-height: 460px;
      }

      .auth-brand {
        padding: 34px 28px;
      }

      .auth-form-panel {
        padding: 36px 28px;
      }

      .brand-hero__headline {
        font-size: 1.6rem;
      }
    }

    /* ========= Mobile ========= */
    @media (max-width: 768px) {
      .layout {
        align-items: flex-start;
        padding: 12px;
      }

      .auth-shell {
        grid-template-columns: 1fr;
        max-width: 100%;
        min-height: auto;
        border-radius: 18px;
      }

      .auth-brand {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 20px 18px;
        gap: 18px;
      }

      .brand-hero {
        max-width: 100%;
      }

      .brand-hero__headline {
        font-size: 1.36rem;
        line-height: 1.35;
        margin-bottom: 8px;
      }

      .brand-hero__sub {
        font-size: .78rem;
        line-height: 1.6;
      }

      .brand-pills {
        gap: 6px;
      }

      .pill {
        font-size: .58rem;
        padding: 4px 10px;
      }

      .auth-form-panel {
        padding: 20px 18px 22px;
      }

      .auth-title {
        font-size: 1.35rem;
      }

      .auth-subtitle {
        margin-bottom: 20px;
      }

      .forgot {
        margin-top: -4px;
        margin-bottom: 16px;
      }

      .btn--full {
        min-height: 44px;
      }
    }

    /* ========= Small mobile ========= */
    @media (max-width: 480px) {
      .layout {
        padding: 10px;
      }

      .auth-shell {
        border-radius: 16px;
      }

      .auth-brand {
        padding: 18px 14px;
        gap: 16px;
      }

      .brand-top {
        gap: 10px;
      }

      .brand-top__icon {
        width: 40px;
        height: 40px;
      }

      .brand-top__icon svg {
        width: 20px;
        height: 20px;
      }

      .brand-top__name {
        font-size: 1.1rem;
      }

      .brand-top__tagline {
        font-size: .68rem;
      }

      .brand-hero__headline {
        font-size: 1.2rem;
      }

      .brand-hero__sub {
        font-size: .74rem;
      }

      .auth-form-panel {
        padding: 18px 14px 20px;
      }

      .auth-title {
        font-size: 1.18rem;
      }

      .auth-subtitle {
        font-size: .76rem;
      }

      .btn--full {
        padding: 12px 16px;
        font-size: .84rem;
      }
    }
  </style>
</head>
<body>

  <div class="ambient">
    <div class="ambient__blob ambient__blob--1"></div>
    <div class="ambient__blob ambient__blob--2"></div>
    <div class="ambient__blob ambient__blob--3"></div>
  </div>

  <div class="layout">
    <div class="auth-shell">

      <div class="auth-brand">
        <div class="brand-top">
          <div class="brand-top__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <div>
            <div class="brand-top__name">SecureNote</div>
            <div class="brand-top__tagline">Private. Minimal. Yours.</div>
          </div>
        </div>

        <div class="brand-hero">
          <h2 class="brand-hero__headline">
            Your thoughts, <em>locked away</em> from the world.
          </h2>
        </div>

        <div class="brand-pills">
          <span class="pill">Made by 66010129 Jiraratchanok Janlasri</span>
        </div>
      </div>

      <div class="auth-form-panel">
        <h1 class="auth-title">Welcome back</h1>


        <div class="feedback" id="feedback"></div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="you@example.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              class="form-input has-toggle"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button class="show-toggle" id="pw-toggle" type="button" title="Show/hide">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <a href="#" class="forgot">Forgot password?</a>

        <button class="btn btn--primary btn--full" id="login-btn" type="button" onclick="handleLogin()">
          <span id="login-label">Sign In</span>
          <div class="btn-spinner" id="login-spinner" style="display:none"></div>
        </button>

        <div class="auth-divider">or</div>

        <button class="btn btn--ghost btn--full" type="button" onclick="location.href='register.html'">
          Create new account
        </button>

        <div class="auth-footer">
          <a href="index.html">← Back to app</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    const BASE_URL = "http://localhost:3001";

    document.getElementById("pw-toggle").addEventListener("click", () => {
      const f = document.getElementById("password");
      f.type = f.type === "password" ? "text" : "password";
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleLogin();
    });

    function showFeedback(msg, type) {
      const el = document.getElementById("feedback");
      el.textContent = (type === "err" ? "⚠ " : "✓ ") + msg;
      el.className = `feedback ${type}`;
      el.style.display = "block";
    }

    function setLoading(on) {
      document.getElementById("login-btn").disabled = on;
      document.getElementById("login-label").style.display = on ? "none" : "inline";
      document.getElementById("login-spinner").style.display = on ? "inline-block" : "none";
    }

    async function handleLogin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        showFeedback("Please fill in all fields.", "err");
        return;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showFeedback("Please enter a valid email address.", "err");
        return;
      }

      setLoading(true);

      try {
        const response = await fetch(`${BASE_URL}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          const errMsg = data?.detail?.message || data?.error || "Login failed.";
          showFeedback(errMsg, "err");
          return;
        }

        sessionStorage.setItem("sn_token", data.token);
        sessionStorage.setItem("sn_user", JSON.stringify(data.user));

        const name = data.user?.name || data.user?.email || "there";
        showFeedback(`Welcome back, ${name}! Redirecting…`, "ok");

        setTimeout(() => {
          window.location.href = "index.html";
        }, 900);
      } catch (err) {
        showFeedback("Cannot connect to server. Is the backend running?", "err");
      } finally {
        setLoading(false);
      }
    }
  </script>
</body>
</html>
