<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureNote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ambient">
    <div class="ambient__blob ambient__blob--1"></div>
    <div class="ambient__blob ambient__blob--2"></div>
    <div class="ambient__blob ambient__blob--3"></div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div>
          <h1 class="brand__name">SecureNote</h1>
          <p class="brand__tagline">Private. Minimal. Yours.</p>
        </div>
      </div>

      <div class="token-section">
        <label class="token-label">
          <span class="token-label__icon"> </span>
  
        </label>
        <div class="token-input-wrap">
          <input
            type="password"
            id="token-input"
            class="token-input"
            placeholder="Handled by backend"
            autocomplete="off"
            disabled
          />
          <button class="token-toggle" id="token-toggle" title="Hidden by script" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="token-status" id="token-status"></div>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat__number" id="note-count">0</span>
          <span class="stat__label">Notes</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat__number" id="server-status-dot">●</span>
          <span class="stat__label" id="server-status-label">Offline</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn nav-btn--active" id="btn-all-notes" onclick="showSection('list')" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
          All Notes
        </button>

        <button class="nav-btn" id="btn-new-note" onclick="clearForm(); showSection('new')" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Note
        </button>
      </nav>


    </aside>

    <main class="main">
      <section class="section" id="section-list">
        <div class="section-header">
          <h2 class="section-title">Your Notes</h2>
          <button class="btn btn--ghost btn--sm" id="refresh-btn" onclick="loadNotes()" type="button">  
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Refresh
          </button>
        </div>

        <div class="search-bar">
    <input
     type="text"
      id="search-input"
      class="search-input"
      placeholder="Search notes..." />
      <button class="btn btn--ghost btn--sm" type="button" onclick="loadNotes()">
        Search
      </button>
    </div>

        <div class="loading-state" id="loading-state" style="display:none">
          <div class="loading-spinner"></div>
          <p class="loading-text">Fetching notes…</p>
        </div>

        <div class="error-banner" id="error-banner" style="display:none"></div>

        <div class="notes-grid" id="notes-grid"></div>

        <div class="empty-state" id="empty-state" style="display:none">
          <div class="empty-state__icon">📝</div>
          <h3>No notes yet</h3>
          <p>Create your first secure note to get started.</p>
          <button class="btn btn--primary" onclick="clearForm(); showSection('new')" type="button">New Note</button>
        </div>
      </section>

      <section class="section" id="section-new" style="display:none">
        <div class="section-header">
          <h2 class="section-title" id="form-section-title">New Note</h2>
        </div>

        <div class="form-card">
          <div class="form-group">
            <label class="form-label" for="note-title">Title</label>
            <input
              type="text"
              id="note-title"
              class="form-input"
              placeholder="Give your note a title…"
              maxlength="120"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="note-content">Content</label>
            <textarea
              id="note-content"
              class="form-textarea"
              placeholder="Write something worth keeping…"
              rows="8"
            ></textarea>
          </div>

          <div class="form-feedback" id="form-feedback" style="display:none"></div>

          <div class="form-actions">
            <button class="btn btn--ghost" onclick="clearForm(); showSection('list')" type="button">Cancel</button>
            <button class="btn btn--primary" id="submit-btn" onclick="createNote()" type="button">
              <span id="submit-label">Save Note</span>
              <div class="btn-spinner" id="submit-spinner" style="display:none"></div>
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
